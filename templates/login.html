<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat OwO Bot - Đăng nhập</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #0f0c1b;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, var(--background) 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Hiệu ứng đốm sáng Neon phía sau */
        .glow-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 1;
            top: 30%;
            left: 40%;
        }

        .login-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 35px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: 380px;
            z-index: 2;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 54px;
            margin-bottom: 15px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
            animation: bounce 3s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #error-msg {
            color: #f87171;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="login-container">
        <div class="logo">🐱</div>
        <h2>Cat OwO Bot</h2>
        <p>Hệ thống tự động hóa & Thống kê thông minh</p>
        
        <div class="input-group">
            <label for="tokenInput">Discord Token của bạn</label>
            <input type="password" id="tokenInput" placeholder="Nhập mã token bảo mật...">
        </div>
        
        <button onclick="handleLogin()">Khám phá Dashboard</button>
        <div id="error-msg"></div>
    </div>

    <script>
        const savedToken = localStorage.getItem('cat_bot_token');
        if (savedToken) { window.location.href = '/dashboard'; }

        async function handleLogin() {
            const tokenValue = document.getElementById('tokenInput').value.trim();
            const errorDiv = document.getElementById('error-msg');
            errorDiv.innerText = "";

            if (!tokenValue) {
                errorDiv.innerText = "⚠️ Vui lòng cung cấp Token!";
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: tokenValue })
                });
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('cat_bot_token', tokenValue);
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.innerText = data.message || "Token không chính xác!";
                }
            } catch (err) {
                errorDiv.innerText = "❌ Lỗi kết nối đến máy chủ Termux!";
            }
        }
    </script>
</body>
</html>
