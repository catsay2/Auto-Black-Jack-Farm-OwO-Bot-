<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat OwO Bot - Thống kê</title>
    <style>
        :root {
            --primary: #6366f1;
            --background: #0b0914;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --text: #f8fafc;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            color: var(--danger);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 26px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .card h3 {
            margin: 0 0 14px 0;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card p {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #fff;
        }

        /* Thẻ biểu thị Lợi Nhuận Đặc Biệt */
        .card.profit-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(0,0,0,0) 100%);
        }

        .profit-up { color: var(--success) !important; filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.3)); }
        .profit-down { color: var(--danger) !important; filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.3)); }

        .footer-note {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2><span>🐱</span> Cat OwO Blackjack Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Đăng xuất</button>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Số dư ban đầu</h3>
                <p id="start_bal">0</p>
            </div>
            <div class="card">
                <h3>Số dư hiện tại</h3>
                <p id="curr_bal">0</p>
            </div>
            <div class="card profit-card">
                <h3>Lợi nhuận ròng</h3>
                <p id="profit" class="profit-up">0</p>
            </div>
            <div class="card">
                <h3>Thắng / Thua / Hòa</h3>
                <p id="stats" style="color: #a5b4fc;">0 / 0 / 0</p>
            </div>
            <div class="card">
                <h3>Lệnh đã thực thi</h3>
                <p id="commands" style="color: #e2e8f0;">0</p>
            </div>
        </div>

        <div class="footer-note">Dữ liệu được cập nhật tự động thời gian thực từ Termux • Tần suất 3s</div>
    </div>

    <script>
        const token = localStorage.getItem('cat_bot_token');
        if (!token) window.location.href = '/';

        async function fetchStats() {
            try {
                const res = await fetch('/api/stats', {
                    headers: { 'Authorization': token }
                });
                if (res.status === 401) logout();
                
                const data = await res.json();
                
                // Hiển thị số kèm dấu phân cách hàng nghìn (ví dụ: 100,000)
                document.getElementById('start_bal').innerText = data.starting_balance.toLocaleString();
                document.getElementById('curr_bal').innerText = data.current_balance.toLocaleString();
                
                const profitEl = document.getElementById('profit');
                profitEl.innerText = (data.internal_profit >= 0 ? "+" : "") + data.internal_profit.toLocaleString();
                
                if (data.internal_profit >= 0) {
                    profitEl.className = 'profit-up';
                } else {
                    profitEl.className = 'profit-down';
                }

                document.getElementById('stats').innerText = `${data.wins} / ${data.losses} / ${data.ties}`;
                document.getElementById('commands').innerText = data.commands_used;
            } catch (err) {
                console.error("Lỗi lấy dữ liệu cập nhật:", err);
            }
        }

        function logout() {
            localStorage.removeItem('cat_bot_token');
            window.location.href = '/';
        }

        // Kích hoạt vòng lặp cập nhật mỗi 3 giây
        fetchStats();
        setInterval(fetchStats, 3000);
    </script>
</body>
</html>
